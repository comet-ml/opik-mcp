name: Legacy TS CI

on:
  # Auto-trigger (pull_request) disabled — manual-only.
  # Legacy TypeScript package is deprecated; run from the Actions tab if needed.
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy/typescript

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: legacy/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pre-commit checks
        run: make precommit

      - name: Build project
        run: npm run build
